name: Deploy to Firebase (Hosting + Functions)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Geovisor ISER Pro
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Node.js 20 (requerido por las Cloud Functions)
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Instalar dependencias de las Cloud Functions
      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      # 4. Instalar Firebase CLI globalmente
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 5. Desplegar Hosting y Functions a Firebase
      #    FIREBASE_TOKEN: generado con `firebase login:ci` → guardado en GitHub Secrets como FIREBASE_TOKEN
      - name: Deploy Hosting + Functions to Firebase
        run: firebase deploy --only hosting,functions --project geovisor-iser
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
