name: Deploy to Firebase (Hosting + Functions)

on:
  push:
    branches:
      - main

# Permisos OIDC para Workload Identity Federation
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy Geovisor ISER Pro
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Node.js 24 (requerido por las Cloud Functions)
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Instalar dependencias de las Cloud Functions
      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      # 4. Autenticación OIDC con Google Cloud (Workload Identity Federation)
      #    Configura estas variables en GitHub Settings > Secrets:
      #    - GCP_SERVICE_ACCOUNT: la service account de Firebase (ej: firebase-adminsdk-xxxxx@geovisor-iser.iam.gserviceaccount.com)
      #    - GCP_WORKLOAD_IDENTITY_PROVIDER: el provider de Workload Identity (ej: projects/303456177094/locations/global/workloadIdentityPools/github/providers/github-oidc)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 5. Instalar Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 6. Desplegar Hosting y Functions a Firebase
      #    La autenticación se obtiene automáticamente del paso OIDC anterior
      - name: Deploy Hosting + Functions to Firebase
        run: firebase deploy --only hosting,functions --project geovisor-iser
